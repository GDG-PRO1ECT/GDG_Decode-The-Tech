
services:
- type: web
  name: decode-the-tech-backend
    env: node
      plan: starter
        buildCommand: npm install && npm run build
          startCommand: npm run start:backend
            healthCheckPath: /api/game/status
              envVars:
                - key: NODE_ENV
                    value: production
                      - key: MONGODB_URI
                        - key: ADMIN_PASSWORD
                          - key: JWT_SECRET

                          
